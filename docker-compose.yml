# 功能：Docker Compose 配置 — 单服务部署（Astro SSR 应用）
version: '3.8'

services:
  faelai:
    build: .
    ports:
      - '8081:8081'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8081
    restart: unless-stopped
    volumes:
      - uploads:/app/public/uploads
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8081/']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads:
